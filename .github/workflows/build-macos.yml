name: Build macOS App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-macos.txt || pip install -r requirements.txt
      - name: Create .env
        run: |
          echo "APP_NAME=${{ secrets.APP_NAME }}" >> client/.env
          echo "SCREENSHOT_MIN_INTERVAL=${{ secrets.SCREENSHOT_MIN_INTERVAL }}" >> client/.env
          echo "SCREENSHOT_MAX_INTERVAL=${{ secrets.SCREENSHOT_MAX_INTERVAL }}" >> client/.env
          echo "IDLE_THRESHOLD=${{ secrets.IDLE_THRESHOLD }}" >> client/.env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> client/.env
          echo "SCREENSHOT_AES_KEY=${{ secrets.SCREENSHOT_AES_KEY }}" >> client/.env
      - name: Build App
        run: |
          if [ -f "client/main.spec" ]; then pyinstaller client/main.spec;
          elif [ -f "main.spec" ]; then pyinstaller main.spec;
          else pyinstaller --windowed --onefile client/main.py; fi

      # === FIX: Sahi path par zip banana taaki GitHub ko file mil sake ===
      - name: Zip App Bundle
        run: |
          if [ -d "dist" ]; then
            cd dist && zip -r ../ETS-Client-Mac.zip ./*
          elif [ -d "client/dist" ]; then
            cd client/dist && zip -r ../../ETS-Client-Mac.zip ./*
          else
            echo "Dist directory not found!" && exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ETS-Client-Mac
          path: ETS-Client-Mac.zip