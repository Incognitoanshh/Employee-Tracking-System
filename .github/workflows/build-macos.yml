name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .env
        run: |
          mkdir -p client
          echo "APP_NAME=${{ secrets.APP_NAME }}" >> client/.env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> client/.env
          echo "SCREENSHOT_AES_KEY=${{ secrets.SCREENSHOT_AES_KEY }}" >> client/.env

      - name: Build
        run: |
          if [ -f "client/main.spec" ]; then
            pyinstaller client/main.spec
          elif [ -f "main.spec" ]; then
            pyinstaller main.spec
          else
            pyinstaller --windowed --name ETS-Client client/main.py
          fi

      - name: Zip all apps
        run: |
          APP=$(find . -name "*.app" | head -n 1)
          if [ -z "$APP" ]; then
            echo "No .app found"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP" ETS-Client-Mac.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS-Client-Mac
          path: ETS-Client-Mac.zip