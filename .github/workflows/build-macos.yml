name: Build macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .env
        run: |
          mkdir -p client
          echo "APP_NAME=${{ secrets.APP_NAME }}" > client/.env
          echo "SCREENSHOT_MIN_INTERVAL=${{ secrets.SCREENSHOT_MIN_INTERVAL }}" >> client/.env
          echo "SCREENSHOT_MAX_INTERVAL=${{ secrets.SCREENSHOT_MAX_INTERVAL }}" >> client/.env
          echo "IDLE_THRESHOLD=${{ secrets.IDLE_THRESHOLD }}" >> client/.env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> client/.env
          echo "SCREENSHOT_AES_KEY=${{ secrets.SCREENSHOT_AES_KEY }}" >> client/.env

      - name: Build App
        shell: bash
        run: |
          if [ -f "client/main.spec" ]; then
            pyinstaller client/main.spec
          elif [ -f "main.spec" ]; then
            pyinstaller main.spec
          else
            pyinstaller --windowed --name ETS-Client client/main.py
          fi

      - name: Package App
        shell: bash
        run: |
          if [ -d "dist/main.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/main.app ETS-Client-Mac.zip
          elif [ -d "dist/ETS-Client.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/ETS-Client.app ETS-Client-Mac.zip
          else
            echo "No .app found"
            ls -R dist || true
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS-Client-Mac
          path: ETS-Client-Mac.zip
