name: Build Cross-Platform Desktop Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 python-dotenv pyinstaller
          if exist requirements.txt (
            echo Cleaning requirements.txt for Windows...
            findstr /V /I "pyobjc" requirements.txt > req_win.txt
            pip install -r req_win.txt
          )

      - name: Create client .env file
        run: |
          echo APP_NAME=ETS > client\.env
          echo SCREENSHOT_MIN_INTERVAL=300 >> client\.env
          echo SCREENSHOT_MAX_INTERVAL=600 >> client\.env
          echo IDLE_THRESHOLD=60 >> client\.env
          echo API_BASE_URL=http://65.21.212.85:8000/api >> client\.env
          echo SCREENSHOT_ENCRYPTION_KEY=g12Cdb/UXwN+NqAwivsBiLEv21yzJeyJ5+PWk6i/i0M= >> client\.env

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --add-data "client/.env;." --name="ETS-Employee-Monitor" client/main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS-Windows-EXE
          path: dist/ETS-Employee-Monitor.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Mac System Tools & Dependencies
        run: |
          brew install create-dmg
          python -m pip install --upgrade pip
          pip install PySide6 python-dotenv pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create client .env file
        run: |
          echo "APP_NAME=ETS" > client/.env
          echo "SCREENSHOT_MIN_INTERVAL=300" >> client/.env
          echo "SCREENSHOT_MAX_INTERVAL=600" >> client/.env
          echo "IDLE_THRESHOLD=60" >> client/.env
          echo "API_BASE_URL=http://65.21.212.85:8000/api" >> client/.env
          echo "SCREENSHOT_ENCRYPTION_KEY=g12Cdb/UXwN+NqAwivsBiLEv21yzJeyJ5+PWk6i/i0M=" >> client/.env

      - name: Build Mac Executable
        run: |
          pyinstaller --onefile --windowed --add-data "client/.env:." --name="ETS-Employee-Monitor" client/main.py

      - name: Create DMG Installer
        run: |
          mkdir dmg_out
          create-dmg \
            --volname "ETS Monitor Installer" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 350 120 \
            "dmg_out/ETS-Employee-Monitor.dmg" \
            "dist/ETS-Employee-Monitor.app"

      - name: Upload Mac DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS-Mac-DMG
          path: dmg_out/ETS-Employee-Monitor.dmg